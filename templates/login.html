<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecVault – Sign In</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #4f46e5;
            --primary-dark: #4338ca;
            --bg-gradient: linear-gradient(135deg, #6366f1, #7c3aed);
            --surface: rgba(255,255,255,0.96);
            --text: #111827;
            --muted: #6b7280;
            --radius: 16px;
            --shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            height: 100vh;
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
        }

        .logo {
            position: absolute;
            top: 2rem;
            left: 2.5rem;
            color: white;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .container {
            display: flex;
            width: 100%;
            max-width: 1100px;
            height: 90vh;
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        .left {
            flex: 1;
            padding: 5rem 4rem;
            color: white;
            display: flex;
            align-items: center;
            background: linear-gradient(135deg, rgba(79,70,229,0.9), rgba(124,58,237,0.9));
        }

        .hero h1 {
            font-size: 3.5rem;
            font-weight: 700;
            line-height: 1.1;
            margin: 0 0 1.5rem;
        }

        .hero p {
            font-size: 1.25rem;
            opacity: 0.92;
            max-width: 480px;
        }

        .right {
            width: 420px;
            background: var(--surface);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem;
        }

        .form-card {
            width: 100%;
            max-width: 380px;
        }

        h2 { font-size: 1.75rem; font-weight: 700; margin: 0 0 0.5rem; }

        p.subtitle { color: var(--muted); margin: 0 0 2rem; font-size: 1rem; }

        .input {
            width: 100%;
            padding: 1rem 1.25rem;
            margin-bottom: 1.25rem;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79,70,229,0.15);
        }

        .btn {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover { background: var(--primary-dark); transform: translateY(-1px); }

        .error {
            background: #fee2e2;
            color: #991b1b;
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
        }

        .footer {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.95rem;
            color: var(--muted);
        }

        .footer a {
            color: var(--primary);
            font-weight: 600;
            text-decoration: none;
        }

        @media (max-width: 900px) {
            .left { display: none; }
            .container { max-width: 420px; height: auto; }
            .right { width: 100%; padding: 3rem 1.5rem; }
        }
    </style>
</head>
<body>

<div class="logo">🔐 SecVault</div>

<div class="container">
    <div class="left">
        <div class="hero">
            <h1>Secure by design.<br>Private by default.</h1>
            <p>End-to-end encrypted cloud storage powered by AES & Diffie-Hellman. Only you hold the keys.</p>
        </div>
    </div>

    <div class="right">
        <div class="form-card">
            <h2>Welcome back</h2>
            <p class="subtitle">Sign in to your secure vault</p>

            {% if error %}
            <div class="error">{{ error }}</div>
            {% endif %}

            <form method="POST">
                <input class="input" name="username" placeholder="Username" required autofocus>
                <input class="input" name="password" type="password" placeholder="Password" required>

                <button type="submit" class="btn">Sign In</button>
            </form>

            <div class="footer">
                New to SecVault? <a href="/register">Create account</a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
