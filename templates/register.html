<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecVault – Create Account</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #4f46e5;
            --primary-dark: #4338ca;
            --bg: linear-gradient(135deg, #6366f1, #7c3aed);
            --surface: #ffffff;
            --radius: 16px;
            --shadow: 0 10px 30px rgba(0,0,0,0.18);
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            height: 100vh;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', system-ui, sans-serif;
        }

        .card {
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 420px;
        }

        h2 {
            font-size: 1.8rem;
            font-weight: 700;
            margin: 0 0 1.5rem;
            text-align: center;
        }

        .input {
            width: 100%;
            padding: 1rem 1.25rem;
            margin-bottom: 1.25rem;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            font-size: 1rem;
        }

        .input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79,70,229,0.15);
        }

        .btn {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover { background: var(--primary-dark); }

        .msg {
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
            text-align: center;
        }

        .error { background: #fee2e2; color: #991b1b; }
        .success { background: #ecfdf5; color: #065f46; }

        .link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.95rem;
            color: #6b7280;
        }

        .link a {
            color: var(--primary);
            font-weight: 600;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Create your account</h2>

    {% if error %}
    <div class="msg error">{{ error }}</div>
    {% endif %}

    {% if success %}
    <div class="msg success">{{ success }}</div>
    {% endif %}

    <form method="POST">
        <input class="input" name="username" placeholder="Choose username" required>
        <input class="input" name="password" type="password" placeholder="Create password" required>
        <button type="submit" class="btn">Sign Up</button>
    </form>

    <div class="link">
        Already have an account? <a href="/login">Sign in</a>
    </div>
</div>

</body>
</html>
